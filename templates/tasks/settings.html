<!DOCTYPE html>
<html lang="pt-BR">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Chaplin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="bg-gray-50">
    <!-- Top Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <button id="sidebar-toggle" class="md:hidden text-gray-700 hover:text-orange-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <a href="{% url 'core:index' %}" class="text-2xl font-bold text-orange-500">Chaplin</a>
                </div>
                <div class="flex items-center gap-4">
                    <button class="text-gray-700 hover:text-orange-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                    </button>
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold">
                        U
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="flex">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static left-0 top-16 md:top-0 w-64 h-screen md:h-auto bg-gray-900 text-white transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40">
            <nav class="p-6 space-y-4">
                <a href="{% url 'tasks:dashboard' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4z"></path>
                        <path fill-rule="evenodd" d="M3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zm8-1a1 1 0 00-1 1v6a1 1 0 001 1h4a1 1 0 001-1v-6a1 1 0 00-1-1h-4z" clip-rule="evenodd"></path>
                    </svg>
                    Dashboard
                </a>
                <a href="{% url 'tasks:list' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                        <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 1 1 0 000 2H3a1 1 0 00-1 1v12a1 1 0 001 1h14a1 1 0 001-1V6a1 1 0 00-1-1h-3a1 1 0 000-2 2 2 0 00-2-2H4z" clip-rule="evenodd"></path>
                    </svg>
                    Tarefas
                </a>
                <a href="{% url 'tasks:create' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-gray-800 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"></path>
                    </svg>
                    Nova Tarefa
                </a>
                <a href="{% url 'tasks:settings' %}" class="flex items-center gap-3 px-4 py-2 rounded-lg bg-orange-500 text-white">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path>
                    </svg>
                    Configurações
                </a>
            </nav>

            <!-- Logout Button -->
            <div class="absolute bottom-6 left-6 right-6">
                <button class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                    Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-auto">
            <div class="p-4 sm:p-6 lg:p-8">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl md:text-4xl font-bold text-gray-900">Configurações</h1>
                    <p class="text-gray-600 mt-2">Gerencie suas preferências e configurações da conta</p>
                </div>

                <!-- Settings Tabs -->
                <div class="flex gap-4 mb-8 border-b border-gray-200 overflow-x-auto">
                    <button class="px-4 py-2 border-b-2 border-orange-500 text-orange-500 font-semibold whitespace-nowrap">
                        Perfil
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                        Segurança
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                        Notificações
                    </button>
                    <button class="px-4 py-2 border-b-2 border-transparent text-gray-600 hover:text-gray-900 whitespace-nowrap">
                        Integrações
                    </button>
                </div>

                <!-- Profile Settings -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Profile Card -->
                    <div class="lg:col-span-1">
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <div class="text-center">
                                <div class="w-24 h-24 bg-orange-500 rounded-full flex items-center justify-center text-white text-4xl font-bold mx-auto mb-4">
                                    U
                                </div>
                                <h3 class="text-xl font-bold text-gray-900">Usuário</h3>
                                <p class="text-gray-600">usuario@email.com</p>
                                <button class="mt-4 w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 px-4 rounded-lg transition">
                                    Alterar Foto
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Settings Form -->
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-lg shadow-md p-6">
                            <form method="POST" class="space-y-6">
                                {% csrf_token %}
                                <!-- Name Input -->
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label for="first_name" class="block text-sm font-medium text-gray-700 mb-2">Nome</label>
                                        <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                    </div>
                                    <div>
                                        <label for="last_name" class="block text-sm font-medium text-gray-700 mb-2">Sobrenome</label>
                                        <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                    </div>
                                </div>

                                <!-- Email Input -->
                                <div>
                                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                    <input type="email" id="email" name="email" value="{{ user.email }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                </div>

                                <!-- Phone Input -->
                                <div>
                                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Telefone</label>
                                    <input type="tel" id="phone" name="phone" value="{{ user_profile.phone }}" placeholder="(00) 00000-0000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                </div>

                                <!-- Endereço via CEP -->
                                <div class="pt-6 border-t border-gray-200">
                                    <h4 class="text-lg font-bold text-gray-900 mb-4">🏠 Endereço Completo</h4>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <div class="md:col-span-1">
                                            <label for="cep" class="block text-sm font-medium text-gray-700 mb-2">CEP</label>
                                            <input type="text" id="cep" name="cep" value="{{ user_profile.cep }}" placeholder="00000-000" maxlength="9" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                            <p id="cep-error" class="hidden text-red-500 text-xs mt-1">CEP inválido ou não encontrado.</p>
                                        </div>
                                        <div class="md:col-span-2">
                                            <label for="logradouro" class="block text-sm font-medium text-gray-700 mb-2">Rua / Logradouro</label>
                                            <input type="text" id="logradouro" name="logradouro" value="{{ user_profile.logradouro }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
                                        </div>
                                    </div>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                        <div class="md:col-span-1">
                                            <label for="numero" class="block text-sm font-medium text-gray-700 mb-2">Número</label>
                                            <input type="text" id="numero" name="numero" value="{{ user_profile.numero }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                        </div>
                                        <div class="md:col-span-2">
                                            <label for="complemento" class="block text-sm font-medium text-gray-700 mb-2">Complemento</label>
                                            <input type="text" id="complemento" name="complemento" value="{{ user_profile.complemento }}" placeholder="Apto, Bloco, etc." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div class="md:col-span-1">
                                            <label for="bairro" class="block text-sm font-medium text-gray-700 mb-2">Bairro</label>
                                            <input type="text" id="bairro" name="bairro" value="{{ user_profile.bairro }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
                                        </div>
                                        <div class="md:col-span-1">
                                            <label for="cidade" class="block text-sm font-medium text-gray-700 mb-2">Cidade</label>
                                            <input type="text" id="cidade" name="cidade" value="{{ user_profile.cidade }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
                                        </div>
                                        <div class="md:col-span-1">
                                            <label for="estado" class="block text-sm font-medium text-gray-700 mb-2">Estado</label>
                                            <input type="text" id="estado" name="estado" value="{{ user_profile.estado }}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
                                        </div>
                                    </div>
                                </div>

                                <!-- Bio Textarea -->
                                <div class="pt-6 border-t border-gray-200">
                                    <label for="bio" class="block text-sm font-medium text-gray-700 mb-2">Biografia</label>
                                    <textarea id="bio" name="bio" rows="4" placeholder="Conte um pouco sobre você..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500">{{ user_profile.bio }}</textarea>
                                </div>

                                <!-- Save Button -->
                                <div class="flex gap-4 pt-6 border-t border-gray-200">
                                    <button
                                        type="submit"
                                        class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 px-4 rounded-lg transition"
                                    >
                                        Salvar Alterações
                                    </button>
                                    <button
                                        type="reset"
                                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg transition"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cepInput = document.getElementById('cep');
            const logradouroInput = document.getElementById('logradouro');
            const bairroInput = document.getElementById('bairro');
            const cidadeInput = document.getElementById('cidade');
            const estadoInput = document.getElementById('estado');
            const numeroInput = document.getElementById('numero');
            const errorMsg = document.getElementById('cep-error');

            cepInput.addEventListener('blur', function() {
                let cep = cepInput.value.replace(/\D/g, '');
                if (cep.length === 8) {
                    errorMsg.classList.add('hidden');
                    
                    fetch(`https://viacep.com.br/ws/${cep}/json/`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.erro) {
                                errorMsg.classList.remove('hidden');
                                errorMsg.innerText = "CEP não encontrado.";
                            } else {
                                logradouroInput.value = data.logradouro;
                                bairroInput.value = data.bairro;
                                cidadeInput.value = data.localidade;
                                estadoInput.value = data.uf;
                                numeroInput.focus();
                            }
                        })
                        .catch(error => {
                            console.error('Erro ao buscar CEP:', error);
                            errorMsg.classList.remove('hidden');
                            errorMsg.innerText = "Erro na requisição. Tente novamente mais tarde.";
                        });
                } else if(cep.length > 0) {
                    errorMsg.classList.remove('hidden');
                    errorMsg.innerText = "CEP inválido. Deve ter 8 dígitos.";
                }
            });
            
            // Mascara simples para CEP
            cepInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 5) {
                    value = value.substring(0, 5) + '-' + value.substring(5, 8);
                }
                e.target.value = value;
            });
        });
    </script>
</body>
</html>
